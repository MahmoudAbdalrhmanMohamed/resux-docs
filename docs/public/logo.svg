  <text x="220" y="131" fill="url(#word)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="78" font-weight="850">Resux</text>
  <text x="225" y="165" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="4">RESUMABLE WEB RUNTIME</text>

  <path d="M520 33H668" stroke="#22D3EE" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>
  <path d="M558 188H684" stroke="#10B981" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>

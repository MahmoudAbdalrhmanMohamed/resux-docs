<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Resux logo</title>
  <desc id="desc">A glowing resumability loop mark beside the Resux wordmark.</desc>
  <defs>
    <linearGradient id="g" x1="70" y1="20" x2="198" y2="204" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="word" x1="250" y1="58" x2="625" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.42" stop-color="#A5F3FC"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="260" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.83 0 0 0 0 0.92 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  <rect width="720" height="220" rx="44" fill="#070A13"/>
  <circle cx="118" cy="110" r="74" fill="url(#g)" opacity="0.16"/>
  <g filter="url(#glow)">
    <path d="M70 72c22-26 65-30 93-8l13 10h-33c-16-9-38-6-50 8-16 18-14 46 5 62 15 13 37 14 53 3" stroke="url(#g)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M166 148c-22 26-65 30-93 8l-13-10h33c16 9 38 6 50-8 16-18 14-46-5-62-15-13-37-14-53-3" stroke="url(#g)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M120 68v84" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
    <path d="M98 108h44" stroke="#F8FAFC" stroke-width="16" stroke-linecap="round"/>
  </g>
  <text x="238" y="139" fill="url(#word)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="82" font-weight="850" letter-spacing="-4">Resux</text>
  <text x="245" y="171" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="4">RESUMABLE WEB RUNTIME</text>
</svg>

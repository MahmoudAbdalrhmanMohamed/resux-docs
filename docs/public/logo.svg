<svg width="720" height="220" viewBox="0 0 720 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Resux logo</title>
  <desc id="desc">The Resux wordmark beside a resumable route monogram.</desc>
  <defs>
    <linearGradient id="surface" x1="18" y1="14" x2="676" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="markPanel" x1="46" y1="45" x2="172" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="route" x1="78" y1="67" x2="154" y2="151" gradientUnits="userSpaceOnUse">

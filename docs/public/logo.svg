  <path d="M80 82C91 68 110 62 128 65C146 68 159 81 159 98C159 116 145 128 124 128H99V150" stroke="#38BDF8" stroke-opacity="0.2" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
